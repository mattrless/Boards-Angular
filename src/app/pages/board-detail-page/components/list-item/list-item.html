<div hlmCard
  class="w-72 shrink-0 self-start overflow-hidden pt-4 pb-2 max-h-[calc(100dvh-9rem)] gap-2"
>
  @if (isEditing()) {
    <edit-list-form
      class="flex h-full w-full items-center justify-center px-4"
      [list]="list()"
      (closeListForm)="closeForm()"
    />
  } @else {
    <div hlmCardHeader class="flex flex-row items-center justify-between gap-2">

      <h3 hlmCardTitle class="line-clamp-1 leading-tight font-bold">
        {{list().title}}
      </h3>

      @if(canDeleteList() || canUpdateList()) {
        <list-actions
          [listId]="list().id!"
          (showForm)="showEditForm()"
          [canDeleteList]="canDeleteList()"
          [canUpdateList]="canUpdateList()"
        />
      }
    </div>
  }

  <div hlmCardContent
    class="cards-drop-list scrollbar-hidden px-4 flex min-h-0 flex-col gap-1 overflow-y-auto"
    cdkDropList
    [id]="'list-' + list().id"
    [cdkDropListConnectedTo]="connectedListIds()"
    [cdkDropListData]="{ listId: list().id, cards: cards() }"
    (cdkDropListDropped)="cardDropped.emit($event)"
  >
    @if (cards().length === 0) {
      <div class="min-h-2"></div>
    }

    @for (card of cards(); track card.id) {
      <card-item class="board-card-item" cdkDrag [card]="card" />
    }
  </div>

  @if (canCreateCard()) {
    <div hlmCardFooter class="w-full px-4 pb-2">
      <create-card-button [listId]="list().id!" />
    </div>
  }
</div>

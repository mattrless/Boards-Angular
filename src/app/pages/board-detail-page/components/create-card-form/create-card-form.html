<form
  [formGroup]="cardForm"
  (ngSubmit)="onSubmit()"
  class="w-full max-w-sm"
>
  <div hlmFieldGroup class="flex flex-row items-start gap-2">

    <div hlmField class="flex-1">
      <input hlmInput
        placeholder="My awesome card"
        autoComplete="title"
        type="text"
        formControlName="title"
        class="w-full"
      />
      @if (cardForm.controls.title.touched && cardForm.controls.title.hasError("required")) {
        <hlm-field-error>Card title is required</hlm-field-error>
      }
    </div>

    <div class="flex gap-1">
      <button hlmBtn type="button" variant="ghost" class="flex-1" (click)="closeCardForm.emit()">
        <ng-icon hlm name="lucideX" size="sm" />
      </button>
      <button hlmBtn type="submit" variant="ghost" class="flex-1" [disabled]="isSubmitting()">
        <ng-icon hlm name="lucideCheck" size="sm" />
      </button>
    </div>

  </div>
  @if (serverError()) {
    <hlm-field-error>{{ serverError() }}</hlm-field-error>
  }
</form>
